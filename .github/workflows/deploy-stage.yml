name: Deploy to stage

on:
  push:
    branches: [integration]
  workflow_dispatch: {}

# One stage deploy at a time.
concurrency:
  group: deploy-stage
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: sloms-stage
  ACR_NAME: slomsacregistry2026
  ACR_LOGIN_SERVER: slomsacregistry2026.azurecr.io
  CONTAINERAPP_NAME: slomsapi-stage
  IMAGE_REPOSITORY: slomsapi

jobs:
  build-and-deploy:
    name: Build & deploy (stage)
    runs-on: ubuntu-latest
    environment: stage # OIDC subject repo:...:environment:stage
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          # :sha is the immutable artifact that gets promoted to prod later.
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to stage Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:${{ github.sha }}"

      - name: Show result
        run: |
          fqdn=$(az containerapp show -n "$CONTAINERAPP_NAME" -g "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Stage now running $IMAGE_REPOSITORY:${{ github.sha }}"
          echo "https://$fqdn"

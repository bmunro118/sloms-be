name: CD

on:
  # Manual-only deploys: this private repo's plan doesn't support environment
  # approval gates, so we gate by requiring a deliberate "Run workflow" click
  # from the Actions tab (against the main branch) instead of auto-deploying on
  # merge. To switch to auto-deploy on merge, uncomment the `push` trigger below.
  # push:
  #   branches:
  #     - main
  workflow_dispatch: {}

# Never run two deploys against the same environment at once.
concurrency:
  group: cd-production
  cancel-in-progress: false

# Required for OIDC: GitHub mints a short-lived token that Azure trusts.
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: sloms
  ACR_NAME: slomsacregistry2026
  ACR_LOGIN_SERVER: slomsacregistry2026.azurecr.io
  CONTAINERAPP_NAME: slomsapi
  IMAGE_REPOSITORY: slomsapi

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    environment: production # gate with required reviewers in repo settings if desired

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Build & test happen inside the Docker build (see backend/Dockerfile),
      #      so a green image is also a green test run. ----

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          # Immutable :sha tag is what we deploy; :latest is a moving convenience tag.
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:${{ github.sha }}"

      - name: Show deployment result
        run: |
          fqdn=$(az containerapp show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Deployed image $IMAGE_REPOSITORY:${{ github.sha }}"
          echo "App URL: https://$fqdn"

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sloms-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slomsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slomsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: slomsapi:latest
    container_name: sloms-app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/slomsdb
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      JWT_SECRET: sloms_jwt_secret_change_me
      JWT_EXPIRES_IN: 8h

volumes:
  postgres_data:

# =============================================================================
# Azure Container App spec for `slomsapi`.
#
# Valid input for:  az containerapp create --yaml <this-file>
#                   az containerapp update --yaml <this-file>
# Schema reference:  https://aka.ms/azure-container-apps-yaml
#
# Secrets are NOT stored here. `database-url` and `jwt-secret` are resolved at
# runtime from Azure Key Vault (`sloms-kv`) using the app's system-assigned
# managed identity, which has get/list on those secrets. The same identity is
# used to pull the image from ACR (AcrPull), so no registry password is stored.
#
# The image tag below is the deploy baseline; the CD workflow (.github/workflows
# /cd.yml) overrides it per-commit via `az containerapp update --image`.
# =============================================================================
location: uksouth
identity:
  type: SystemAssigned
properties:
  managedEnvironmentId: /subscriptions/295f53a3-9253-4547-8062-51d425160903/resourceGroups/sloms/providers/Microsoft.App/managedEnvironments/slomsapi-env
  workloadProfileName: Consumption
  configuration:
    activeRevisionsMode: Single
    secrets:
      - name: database-url
        keyVaultUrl: https://sloms-kv.vault.azure.net/secrets/database-url
        identity: system
      - name: jwt-secret
        keyVaultUrl: https://sloms-kv.vault.azure.net/secrets/jwt-secret
        identity: system
    registries:
      - server: slomsacregistry2026.azurecr.io
        identity: system
    ingress:
      external: true
      targetPort: 3000
      transport: Auto
      allowInsecure: false
      traffic:
        - latestRevision: true
          weight: 100
  template:
    containers:
      - name: slomsapi
        image: slomsacregistry2026.azurecr.io/slomsapi:latest
        # The app reads DATABASE_URL (src/config/database.config.ts). PG* vars
        # are used by entrypoint.sh (pg_isready / migrations / seed).
        env:
          - name: NODE_ENV
            value: production
          - name: DATABASE_URL
            secretRef: database-url
          - name: JWT_SECRET
            secretRef: jwt-secret
          - name: JWT_EXPIRES_IN
            value: "8h"
          - name: PGHOST
            value: sloms-postgres.postgres.database.azure.com
          - name: PGPORT
            value: "5432"
          - name: PGUSER
            value: slomsadmin
        resources:
          cpu: 0.5
          memory: 1Gi
    scale:
      minReplicas: 0
      maxReplicas: 10

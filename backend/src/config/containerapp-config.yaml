apiVersion: app.containerservice.azure.com/v1beta1
kind: ContainerApp
metadata:
  name: slomsapi
identity:
  type: SystemAssigned
properties:
  environmentId: /subscriptions/295f53a3-9253-4547-8062-51d425160903/resourceGroups/sloms/providers/Microsoft.App/managedEnvironments/slomsapi-env
  workloadProfileName: Consumption
configuration:
  # ----------------------------------------------------------------------------
  # Secrets are NOT stored in this file. They are resolved from Azure Key Vault
  # at runtime using the Container App's system-assigned managed identity.
  #
  # Prerequisites (already provisioned):
  #   1. Key Vault `sloms-kv` holds the secrets `database-url` and `jwt-secret`.
  #   2. The Container App's system-assigned identity has get/list on those
  #      secrets (granted via az keyvault set-policy).
  #
  # NOTE: the system-assigned identity does not exist until the app is created
  # once. For a first-time deploy, create the app, grant the identity access to
  # the vault, then re-run the deploy so the keyVaultUrl references resolve.
  # ----------------------------------------------------------------------------
  secrets:
    - name: database-url
      keyVaultUrl: "https://sloms-kv.vault.azure.net/secrets/database-url"
      identity: system
    - name: jwt-secret
      keyVaultUrl: "https://sloms-kv.vault.azure.net/secrets/jwt-secret"
      identity: system
  ingress:
    external: true
    targetPort: 3000
    traffic:
      - weight: 100
        revisionName: slomsapi-rev-00001
        label: production
template:
  containers:
    - name: slomsapi
      image: slomsacregistry2026.azurecr.io/slomsapi:latest
      env:
        # The app reads DATABASE_URL (see src/config/database.config.ts); the
        # old DB_* / MSSQL vars were unused. The Postgres connection string and
        # JWT secret come from Key Vault via the secretRefs above.
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          secretRef: database-url
        - name: JWT_SECRET
          secretRef: jwt-secret
        - name: JWT_EXPIRES_IN
          value: "8h"
      resources:
        cpu: 100m
        memoryGiB: 0.5
scale:
  minReplicas: 1
  maxReplicas: 3
rules:
  - type: http
    metadata:
      concurrentRequests: "50"
